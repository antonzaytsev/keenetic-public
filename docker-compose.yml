services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bin/start
    ports:
      - "${BACKEND_PORT:-4000}:${BACKEND_PORT:-4000}"
    volumes:
      - ./backend:/app
    environment:
      - RACK_ENV=${RACK_ENV:-development}
      - BUNDLE_PATH=/app/vendor/bundle
      - BACKEND_PORT=${BACKEND_PORT:-4000}
      - KEENETIC_HOST=${KEENETIC_HOST}
      - KEENETIC_LOGIN=${KEENETIC_LOGIN}
      - KEENETIC_PASSWORD=${KEENETIC_PASSWORD}
    tty: true
    stdin_open: true
    restart: unless-stopped

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    volumes:
      - ${BACKUP_CONFIG_DIR:-./scheduler/backups}:/app/backups
    environment:
      - BACKEND_URL=http://backend:${BACKEND_PORT:-4000}
      - BACKUP_CONFIG_TIME=${BACKUP_CONFIG_TIME:-02:00}
      - BACKUP_CONFIG_RUN_ON_START=${BACKUP_CONFIG_RUN_ON_START:-true}
      - BACKUP_CONFIG_KEEP=${BACKUP_CONFIG_KEEP:-10}
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: bin/start
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    volumes:
      - ./frontend:/app
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - VITE_BACKEND_PORT=${BACKEND_PORT:-4000}
    depends_on:
      - backend
    restart: unless-stopped
